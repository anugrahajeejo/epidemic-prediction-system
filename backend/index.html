<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Disease Risk Prediction</title>
<style>
body { font-family: Arial; background: linear-gradient(120deg,#f0f4f8,#d9e2ec); display:flex; justify-content:center; align-items:center; height:100vh; }
.container { background:white; padding:40px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:400px; text-align:center; }
h2 { margin-bottom:25px; color:#333; }
input { width:80%; padding:12px; margin:10px 0; border-radius:6px; border:1px solid #ccc; font-size:16px; }
button { width:85%; padding:12px; margin-top:15px; border:none; border-radius:6px; background-color:#007bff; color:white; font-size:16px; cursor:pointer; transition:0.3s; }
button:hover { background-color:#0056b3; }
#result { margin-top:25px; font-size:20px; font-weight:bold; }
.footer { margin-top:20px; font-size:12px; color:#666; }
</style>
</head>
<body>

<div class="container">
<h2>Disease Risk Prediction</h2>
<input type="number" id="temp" placeholder="Temperature (°C)" required>
<input type="number" id="humidity" placeholder="Humidity (%)" required>
<input type="number" id="rainfall" placeholder="Rainfall (mm)" required>
<button onclick="predictRisk()">Predict Risk</button>
<div id="result"></div>
<div class="footer">Demo using Node.js</div>
</div>

<script>
async function predictRisk() {
    const temp = document.getElementById("temp").value;
    const humidity = document.getElementById("humidity").value;
    const rainfall = document.getElementById("rainfall").value;
    const resultDiv = document.getElementById("result");

    if (!temp || !humidity || !rainfall) {
        resultDiv.style.color = "red";
        resultDiv.innerText = "Please fill in all fields!";
        return;
    }

    try {
        const response = await fetch("http://localhost:5001/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ temperature: temp, humidity: humidity, rainfall: rainfall })
        });

        if (!response.ok) throw new Error("Server not responding");

        const data = await response.json();
        let color = "green";
        if (data.prediction === "High") color = "red";
        else if (data.prediction === "Medium") color = "orange";

        resultDiv.style.color = color;
        resultDiv.innerText = "Risk Level: " + data.prediction;

    } catch (error) {
        resultDiv.style.color = "red";
        resultDiv.innerText = "Error: Unable to reach backend";
        console.error(error);
    }
}
</script>

</body>
</html>
